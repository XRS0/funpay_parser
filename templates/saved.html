<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funpay Parser — Сохранённые результаты</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
</head>
<body>
    <div class="bg-shapes"></div>
    <canvas id="stars" class="stars-canvas"></canvas>
    <div class="glow-layer">
        <div class="parallax" data-speed="0.02">
            <div class="shape shape-1"></div>
        </div>
        <div class="parallax" data-speed="0.04">
            <div class="shape shape-3"></div>
        </div>
        <div class="parallax" data-speed="0.03">
            <div class="shape shape-2"></div>
        </div>
        <div class="parallax" data-speed="0.05">
            <div class="shape shape-4"></div>
        </div>
        <div class="parallax" data-speed="0.06">
            <div class="shape shape-5"></div>
        </div>
    </div>
    <div class="app">
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-35 12 12)"/>
                        <circle cx="19" cy="8" r="1.5" fill="currentColor" stroke="none"/>
                    </svg>
                </div>
                <div>
                    <h1>Сохранённые результаты</h1>
                    <p class="subtitle">История парсинга и детали сохранённых запусков</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="/scheduler" class="btn btn-secondary btn-sm">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Расписание
                </a>
                <a href="/" class="btn btn-secondary btn-sm">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Вернуться к парсеру
                </a>
                <a href="/settings" class="btn btn-secondary btn-sm">Настройки</a>
            </div>
        </header>

        <main class="main">
            <section class="section reveal" style="animation-delay: 0.05s;">
                <div class="section-header">
                    <div class="section-label">История запусков</div>
                    <button id="refresh-btn" class="btn btn-ghost btn-sm">Обновить</button>
                </div>

                <div id="saved-empty" class="empty-state" style="display:none;">
                    <div class="empty-title">Нет сохранённых результатов</div>
                    <div class="empty-text">Запусти парсер с профилем на главной странице, и результат появится здесь.</div>
                </div>

                <div id="saved-grid" class="saved-grid stagger visible"></div>
            </section>
        </main>
    </div>

    <!-- Detail modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content" style="max-width: 1100px; width: 92vw;">
            <div class="modal-header">
                <h2 class="modal-title">Детали сохранённого результата</h2>
                <button id="detail-modal-close" class="modal-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="detail-modal-body">
                <!-- Filled dynamically -->
            </div>
            <div class="modal-footer">
                <button id="detail-modal-delete" class="btn btn-danger">Удалить</button>
                <button id="detail-modal-close-btn" class="btn btn-secondary">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const refreshBtn = document.getElementById('refresh-btn');
        const savedGrid = document.getElementById('saved-grid');
        const savedEmpty = document.getElementById('saved-empty');
        const detailModal = document.getElementById('detail-modal');
        const detailModalBody = document.getElementById('detail-modal-body');
        const detailModalClose = document.getElementById('detail-modal-close');
        const detailModalCloseBtn = document.getElementById('detail-modal-close-btn');
        const detailModalDelete = document.getElementById('detail-modal-delete');
        const toastEl = document.getElementById('toast');

        let profiles = [];
        let savedResults = [];
        let currentDetailId = null;
        let notificationTimer = null;

        const editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
        const trashIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        const clockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

        function escapeHtml(text) {
            if (text == null) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            const d = new Date(isoString);
            return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function showToast(message, isError) {
            toastEl.classList.remove('hiding', 'visible');
            void toastEl.offsetWidth;
            toastEl.textContent = message;
            toastEl.className = 'toast' + (isError ? ' error' : '') + ' visible';
            clearTimeout(notificationTimer);
            notificationTimer = setTimeout(() => {
                toastEl.classList.add('hiding');
                setTimeout(() => toastEl.classList.remove('visible'), 350);
            }, 4000);
        }

        async function loadData() {
            const [profilesResp, resultsResp] = await Promise.all([
                fetch('/api/profiles'),
                fetch('/api/saved_results')
            ]);
            profiles = await profilesResp.json();
            savedResults = await resultsResp.json();
            renderSaved();
        }

        function profileNameById(id) {
            const p = profiles.find(p => p.id === id);
            return p ? p.name : `Профиль #${id}`;
        }

        function renderSaved() {
            if (!savedResults.length) {
                savedGrid.innerHTML = '';
                savedEmpty.style.display = 'block';
                return;
            }
            savedEmpty.style.display = 'none';

            savedGrid.innerHTML = savedResults.map((r, i) => {
                const c = r.cheapest || {};
                const s = r.summary || {};
                const price = c.price ? `${c.price} ${c.currency || ''}` : '—';
                return `
                    <div class="saved-card stagger-item" data-id="${r.id}" style="animation: slideUp 0.4s ease ${i * 0.05}s both;">
                        <div class="saved-card-main">
                            <div class="saved-date">${clockIcon}<span>${formatDate(r.run_at)}</span></div>
                            <div class="saved-profile">
                                <span class="badge plan">${escapeHtml(profileNameById(r.profile_id))}</span>
                            </div>
                            <div class="saved-price">${escapeHtml(price)}</div>
                            <div class="saved-summary">
                                <span class="badge neutral">${s.total_plus || 0} Plus</span>
                                <span class="badge neutral">${s.classified || 0} LLM</span>
                                <span class="badge personal">${s.personal || 0} личных</span>
                                <span class="badge shared">${s.shared || 0} общих</span>
                            </div>
                        </div>
                        <div class="saved-actions">
                            <button class="btn btn-icon saved-view-btn" data-id="${r.id}" title="Подробнее">
                                ${editIcon}
                            </button>
                            <button class="btn btn-icon saved-delete-btn" data-id="${r.id}" title="Удалить">
                                ${trashIcon}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            savedGrid.querySelectorAll('.saved-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.saved-actions')) return;
                    openDetail(parseInt(card.dataset.id));
                });
            });
            savedGrid.querySelectorAll('.saved-view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openDetail(parseInt(btn.dataset.id));
                });
            });
            savedGrid.querySelectorAll('.saved-delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSaved(parseInt(btn.dataset.id));
                });
            });
        }

        async function openDetail(id) {
            currentDetailId = id;
            const resp = await fetch(`/api/saved_results/${id}`);
            if (!resp.ok) {
                showToast('Не удалось загрузить результат', true);
                return;
            }
            const data = await resp.json();
            const c = data.cheapest || {};
            const s = data.summary || {};
            const allPlus = (data.all_results || [])
                .filter(r => r.is_plus)
                .sort((a, b) => a.price - b.price);
            const display = allPlus.slice(0, 50);
            const rows = display
                .map((r, i) => {
                    const typeLabel = r.account_type === 'personal' ? 'Личный' : (r.account_type === 'shared' ? 'Общий' : '-');
                    return `
                    <tr class="${r.account_type}" style="animation: slideUp 0.3s ease ${i * 0.03}s both;">
                        <td>${r.price} ${r.currency || ''}</td>
                        <td><span class="badge ${r.account_type || 'neutral'}">${typeLabel}</span></td>
                        <td>${r.confidence?.toFixed(2) || '-'}</td>
                        <td>${escapeHtml(r.title || '')}</td>
                        <td>${escapeHtml(r.seller || '')}</td>
                        <td><a href="${r.url || '#'}" target="_blank">Funpay ↗</a></td>
                    </tr>
                `}).join('');
            const moreText = allPlus.length > display.length
                ? `<div style="text-align:center; color: var(--text-3); padding: 12px;">Показано ${display.length} из ${allPlus.length} лотов. Полный список — в файле results.json.</div>`
                : '';

            const userIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
            const typeLabel = c.account_type === 'personal' ? 'Личный' : (c.account_type === 'shared' ? 'Общий' : '—');
            detailModalBody.innerHTML = `
                <div class="cheapest-card card" style="margin-bottom: 20px;">
                    <div class="cheapest-hero">
                        <div class="cheapest-header">
                            <span class="cheapest-badge">Самый дешёвый личный</span>
                            <span class="badge ${c.account_type || 'neutral'}">${typeLabel}</span>
                        </div>
                        <div class="cheapest-price">${c.price ? c.price : '—'}<span class="cheapest-currency">${c.currency || ''}</span></div>
                        <div class="cheapest-title">${escapeHtml(c.title || '—')}</div>
                        <div class="cheapest-seller">${userIcon}${escapeHtml(c.seller || '—')}</div>
                        <div class="cheapest-meta">
                            <div class="cheapest-meta-item">
                                <span class="cheapest-meta-label">Дата</span>
                                <span class="cheapest-meta-value">${formatDate(data.run_at)}</span>
                            </div>
                            <div class="cheapest-meta-item">
                                <span class="cheapest-meta-label">Профиль</span>
                                <span class="cheapest-meta-value">${escapeHtml(profileNameById(data.profile_id))}</span>
                            </div>
                            <div class="cheapest-meta-item">
                                <span class="cheapest-meta-label">Уверенность</span>
                                <span class="cheapest-meta-value">${c.confidence?.toFixed(2) || '-'}</span>
                            </div>
                        </div>
                    </div>
                    <a href="${c.url || '#'}" target="_blank" class="btn btn-primary cheapest-link">Открыть на Funpay ↗</a>
                </div>
                <div class="summary-card card" style="margin-bottom: 20px;">
                    <div class="section-label" style="margin-top: 0;">Сводка</div>
                    <div class="summary-grid">
                        <div class="stat"><strong>${s.total_plus || 0}</strong><div class="stat-label">Всего Plus</div></div>
                        <div class="stat"><strong>${s.classified || 0}</strong><div class="stat-label">Проверено LLM</div></div>
                        <div class="stat personal"><strong>${s.personal || 0}</strong><div class="stat-label">Личные</div></div>
                        <div class="stat shared"><strong>${s.shared || 0}</strong><div class="stat-label">Общие</div></div>
                        <div class="stat"><strong>${s.other || 0}</strong><div class="stat-label">Прочие</div></div>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>Цена</th><th>Тип</th><th>Уверенность</th><th>Заголовок</th><th>Продавец</th><th>Ссылка</th></tr>
                        </thead>
                        <tbody>${rows || '<tr class="empty-row"><td colspan="6">Нет данных</td></tr>'}</tbody>
                    </table>
                </div>
                ${moreText}
            `;
            detailModal.classList.add('visible');
        }

        function closeDetail() {
            detailModal.classList.remove('visible');
            currentDetailId = null;
        }

        async function deleteSaved(id) {
            if (!confirm('Удалить сохранённый результат?')) return;
            const resp = await fetch(`/api/saved_results/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                if (currentDetailId === id) closeDetail();
                await loadData();
                showToast('Результат удалён');
            } else {
                showToast('Ошибка удаления', true);
            }
        }

        refreshBtn.addEventListener('click', loadData);
        detailModalClose.addEventListener('click', closeDetail);
        detailModalCloseBtn.addEventListener('click', closeDetail);
        detailModalDelete.addEventListener('click', () => {
            if (currentDetailId) deleteSaved(currentDetailId);
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetail();
        });

        loadData();
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
