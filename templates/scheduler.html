<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funpay Parser — Расписание</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-shapes"></div>
    <canvas id="stars" class="stars-canvas"></canvas>
    <div class="glow-layer">
        <div class="parallax" data-speed="0.02">
            <div class="shape shape-1"></div>
        </div>
        <div class="parallax" data-speed="0.04">
            <div class="shape shape-3"></div>
        </div>
        <div class="parallax" data-speed="0.03">
            <div class="shape shape-2"></div>
        </div>
        <div class="parallax" data-speed="0.05">
            <div class="shape shape-4"></div>
        </div>
        <div class="parallax" data-speed="0.06">
            <div class="shape shape-5"></div>
        </div>
    </div>
    <div class="app">
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-35 12 12)"/>
                        <circle cx="19" cy="8" r="1.5" fill="currentColor" stroke="none"/>
                    </svg>
                </div>
                <div>
                    <h1>Расписание парсинга</h1>
                    <p class="subtitle">Автоматический запуск поиска по расписанию</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary btn-sm">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Вернуться к парсеру
                </a>
                <a href="/settings" class="btn btn-secondary btn-sm">Настройки</a>
            </div>
        </header>

        <main class="main">
            <section class="section reveal" style="animation-delay: 0.05s;">
                <div class="section-header">
                    <div class="section-label">Добавить расписание</div>
                </div>
                <div class="card">
                    <div class="form-grid">
                        <div class="field">
                            <label for="schedule-profile">Профиль</label>
                            <select id="schedule-profile" class="form-input"></select>
                        </div>
                        <div class="field">
                            <label for="schedule-interval">Интервал (минут)</label>
                            <input type="number" id="schedule-interval" class="form-input" value="60" min="1" step="1">
                        </div>
                    </div>
                    <div style="margin-top: 16px;">
                        <button id="add-schedule-btn" class="btn btn-primary">Добавить расписание</button>
                    </div>
                </div>
            </section>

            <section class="section reveal" style="animation-delay: 0.1s;">
                <div class="section-header">
                    <div class="section-label">Активные расписания</div>
                    <button id="refresh-schedules-btn" class="btn btn-ghost btn-sm">Обновить</button>
                </div>

                <div id="schedules-empty" class="empty-state" style="display:none;">
                    <div class="empty-title">Расписаний пока нет</div>
                    <div class="empty-text">Выбери профиль и интервал, чтобы парсер запускался автоматически.</div>
                </div>

                <div id="schedules-list" class="saved-grid stagger visible"></div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const scheduleProfile = document.getElementById('schedule-profile');
        const scheduleInterval = document.getElementById('schedule-interval');
        const addScheduleBtn = document.getElementById('add-schedule-btn');
        const schedulesList = document.getElementById('schedules-list');
        const schedulesEmpty = document.getElementById('schedules-empty');
        const refreshSchedulesBtn = document.getElementById('refresh-schedules-btn');
        const toastEl = document.getElementById('toast');

        let profiles = [];
        let schedules = [];
        let notificationTimer = null;

        const clockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
        const playIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        const trashIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        const editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

        function formatDate(isoString) {
            if (!isoString) return '—';
            const d = new Date(isoString);
            return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function showToast(message, isError) {
            toastEl.classList.remove('hiding', 'visible');
            void toastEl.offsetWidth;
            toastEl.textContent = message;
            toastEl.className = 'toast' + (isError ? ' error' : '') + ' visible';
            clearTimeout(notificationTimer);
            notificationTimer = setTimeout(() => {
                toastEl.classList.add('hiding');
                setTimeout(() => toastEl.classList.remove('visible'), 350);
            }, 4000);
        }

        async function loadData() {
            const [profilesResp, schedulesResp] = await Promise.all([
                fetch('/api/profiles'),
                fetch('/api/schedules')
            ]);
            profiles = await profilesResp.json();
            schedules = await schedulesResp.json();
            renderProfilesSelect();
            renderSchedules();
        }

        function renderProfilesSelect() {
            scheduleProfile.innerHTML = profiles.map(p =>
                `<option value="${p.id}">${escapeHtml(p.name)}</option>`
            ).join('') || '<option disabled>Нет профилей</option>';
            scheduleProfile.disabled = !profiles.length;
            addScheduleBtn.disabled = !profiles.length;
        }

        function escapeHtml(text) {
            if (text == null) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderSchedules() {
            if (!schedules.length) {
                schedulesList.innerHTML = '';
                schedulesEmpty.style.display = 'block';
                return;
            }
            schedulesEmpty.style.display = 'none';

            schedulesList.innerHTML = schedules.map((s, i) => {
                const next = s.enabled ? formatDate(s.next_run_at) : '—';
                const statusClass = s.enabled ? 'success' : 'neutral';
                return `
                    <div class="saved-card stagger-item" style="animation: slideUp 0.4s ease ${i * 0.05}s both;">
                        <div class="saved-card-main">
                            <div class="saved-date">${clockIcon}<span>Интервал: ${s.interval_minutes} мин</span></div>
                            <div class="saved-profile"><span class="badge plan">${escapeHtml(s.profile_name)}</span></div>
                            <div class="saved-summary">
                                <span class="badge ${statusClass}">${s.enabled ? 'Активно' : 'Остановлено'}</span>
                                <span class="badge neutral">Следующий: ${next}</span>
                                <span class="badge neutral">Последний: ${formatDate(s.last_run_at)}</span>
                            </div>
                        </div>
                        <div class="saved-actions">
                            <button class="btn btn-icon schedule-run-btn" data-id="${s.id}" title="Запустить сейчас">
                                ${playIcon}
                            </button>
                            <button class="btn btn-icon schedule-toggle-btn" data-id="${s.id}" data-enabled="${s.enabled}" title="${s.enabled ? 'Остановить' : 'Запустить'}">
                                ${editIcon}
                            </button>
                            <button class="btn btn-icon schedule-delete-btn" data-id="${s.id}" title="Удалить">
                                ${trashIcon}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            schedulesList.querySelectorAll('.schedule-run-btn').forEach(btn => {
                btn.addEventListener('click', () => runScheduleNow(parseInt(btn.dataset.id)));
            });
            schedulesList.querySelectorAll('.schedule-toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => toggleSchedule(parseInt(btn.dataset.id), btn.dataset.enabled !== 'true'));
            });
            schedulesList.querySelectorAll('.schedule-delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteSchedule(parseInt(btn.dataset.id)));
            });
        }

        async function addSchedule() {
            const profileId = parseInt(scheduleProfile.value);
            const interval = parseInt(scheduleInterval.value);
            if (!profileId || !interval || interval < 1) {
                showToast('Выбери профиль и укажи интервал ≥ 1 минуты', true);
                return;
            }
            const resp = await fetch('/api/schedules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ profile_id: profileId, interval_minutes: interval, enabled: true })
            });
            if (resp.ok) {
                showToast('Расписание добавлено');
                scheduleInterval.value = 60;
                await loadData();
            } else {
                const err = await resp.json();
                showToast(err.error || 'Ошибка добавления', true);
            }
        }

        async function toggleSchedule(id, enabled) {
            const resp = await fetch(`/api/schedules/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            });
            if (resp.ok) {
                showToast(enabled ? 'Расписание активировано' : 'Расписание остановлено');
                await loadData();
            } else {
                showToast('Ошибка обновления', true);
            }
        }

        async function runScheduleNow(id) {
            const resp = await fetch(`/api/schedules/${id}/run`, { method: 'POST' });
            if (resp.ok) {
                showToast('Запуск по расписанию начат');
            } else {
                const err = await resp.json();
                showToast(err.error || 'Ошибка запуска', true);
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('Удалить расписание?')) return;
            const resp = await fetch(`/api/schedules/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                showToast('Расписание удалено');
                await loadData();
            } else {
                showToast('Ошибка удаления', true);
            }
        }

        addScheduleBtn.addEventListener('click', addSchedule);
        refreshSchedulesBtn.addEventListener('click', loadData);

        loadData();
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
