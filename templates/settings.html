<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funpay Parser — Настройки</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
</head>
<body>
    <div class="bg-shapes"></div>
    <canvas id="stars" class="stars-canvas"></canvas>
    <div class="glow-layer">
        <div class="parallax" data-speed="0.02">
            <div class="shape shape-1"></div>
        </div>
        <div class="parallax" data-speed="0.04">
            <div class="shape shape-3"></div>
        </div>
        <div class="parallax" data-speed="0.03">
            <div class="shape shape-2"></div>
        </div>
        <div class="parallax" data-speed="0.05">
            <div class="shape shape-4"></div>
        </div>
        <div class="parallax" data-speed="0.06">
            <div class="shape shape-5"></div>
        </div>
    </div>
    <div class="app">
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-35 12 12)"/>
                        <circle cx="19" cy="8" r="1.5" fill="currentColor" stroke="none"/>
                    </svg>
                </div>
                <div>
                    <h1>Настройки</h1>
                    <p class="subtitle">Конфигурация LLM и уведомлений</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary btn-sm">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Вернуться к парсеру
                </a>
            </div>
        </header>

        <main class="main">
            <section class="section reveal" style="animation-delay: 0.05s;">
                <div class="section-header">
                    <div class="section-label">Настройки LLM</div>
                </div>
                <div class="card" style="max-width: 640px;">
                    <div class="field">
                        <label for="llm-provider">Провайдер</label>
                        <select id="llm-provider" class="form-input">
                            <option value="fireworks">Fireworks</option>
                            <option value="openrouter">OpenRouter</option>
                        </select>
                        <div class="hint" style="margin-top: 4px; color: var(--text-3);">
                            Выберите провайдера LLM для классификации лотов.
                        </div>
                    </div>
                    <div class="field">
                        <label for="llm-model">Модель</label>
                        <input type="text" id="llm-model" class="form-input" placeholder="оставь пустым для значения по умолчанию">
                        <div class="hint" style="margin-top: 4px; color: var(--text-3);">
                            Модель по умолчанию: <span id="default-model"></span>
                        </div>
                    </div>
                    <div class="field">
                        <label for="llm-api-key">API ключ</label>
                        <input type="password" id="llm-api-key" class="form-input" placeholder="Введите API ключ">
                        <div id="key-status" class="hint" style="margin-top: 6px;"></div>
                    </div>
                    <div class="actions" style="margin-top: 16px;">
                        <button id="save-key-btn" class="btn btn-primary">Сохранить LLM</button>
                    </div>
                </div>
            </section>

            <section class="section reveal" style="animation-delay: 0.1s;">
                <div class="section-header">
                    <div class="section-label">Telegram уведомления</div>
                </div>
                <div class="card" style="max-width: 640px;">
                    <div class="field">
                        <label for="telegram-bot-token">Bot token</label>
                        <input type="password" id="telegram-bot-token" class="form-input" placeholder="Введите токен Telegram бота">
                        <div id="telegram-token-status" class="hint" style="margin-top: 6px;"></div>
                    </div>
                    <div class="field">
                        <label for="telegram-chat-id">Chat ID пользователя</label>
                        <input type="text" id="telegram-chat-id" class="form-input" placeholder="Заполнится автоматически после /start или введи вручную">
                        <div class="hint" style="margin-top: 4px; color: var(--text-3);">
                            Сначала открой бота <span id="telegram-bot-link-wrap"></span> в Telegram и отправь <b>/start</b>, затем нажми «Найти чат».
                        </div>
                    </div>
                    <div class="actions" style="margin-top: 16px; display:flex; gap: 10px; flex-wrap: wrap;">
                        <button id="save-telegram-btn" class="btn btn-primary">Сохранить Telegram</button>
                        <button id="sync-telegram-btn" class="btn btn-secondary">Найти чат после /start</button>
                        <button id="test-telegram-btn" class="btn btn-secondary">Тестовое сообщение</button>
                    </div>
                    <div id="telegram-status" class="hint" style="margin-top: 12px;"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const providerSelect = document.getElementById('llm-provider');
        const modelInput = document.getElementById('llm-model');
        const keyInput = document.getElementById('llm-api-key');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const keyStatus = document.getElementById('key-status');
        const defaultModel = document.getElementById('default-model');
        const telegramTokenInput = document.getElementById('telegram-bot-token');
        const telegramChatInput = document.getElementById('telegram-chat-id');
        const telegramTokenStatus = document.getElementById('telegram-token-status');
        const telegramStatus = document.getElementById('telegram-status');
        const telegramBotLinkWrap = document.getElementById('telegram-bot-link-wrap');
        const saveTelegramBtn = document.getElementById('save-telegram-btn');
        const syncTelegramBtn = document.getElementById('sync-telegram-btn');
        const testTelegramBtn = document.getElementById('test-telegram-btn');
        const toast = document.getElementById('toast');

        const defaultModels = {
            fireworks: 'accounts/fireworks/models/llama-v3p1-70b-instruct',
            openrouter: 'openai/gpt-4o-mini',
        };

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateDefaultModelHint() {
            defaultModel.textContent = defaultModels[providerSelect.value] || '';
        }

        async function loadSettings() {
            try {
                const resp = await fetch('/api/settings');
                if (!resp.ok) throw new Error('Failed to load settings');
                const data = await resp.json();
                providerSelect.value = data.llm_provider || 'fireworks';
                modelInput.value = data.llm_model || '';
                updateDefaultModelHint();
                if (data.has_key) {
                    keyStatus.textContent = 'Ключ установлен: ' + data.llm_api_key;
                    keyStatus.style.color = 'var(--success)';
                } else {
                    keyStatus.textContent = 'Ключ не настроен.';
                    keyStatus.style.color = 'var(--error)';
                }
                telegramTokenInput.value = '';
                telegramChatInput.value = data.telegram_chat_id || '';
                if (data.telegram_has_token) {
                    const botName = data.telegram_bot_username ? ` (@${data.telegram_bot_username})` : '';
                    telegramTokenStatus.textContent = 'Bot token установлен: ' + data.telegram_bot_token + botName;
                    telegramTokenStatus.style.color = 'var(--success)';
                    if (data.telegram_bot_username) {
                        telegramBotLinkWrap.innerHTML = `<a href="https://t.me/${data.telegram_bot_username}" target="_blank" rel="noreferrer">@${data.telegram_bot_username}</a>`;
                    } else {
                        telegramBotLinkWrap.textContent = 'бота';
                    }
                } else {
                    telegramTokenStatus.textContent = 'Bot token не настроен.';
                    telegramTokenStatus.style.color = 'var(--error)';
                    telegramBotLinkWrap.textContent = 'бота';
                }
                if (data.telegram_notifications) {
                    telegramStatus.textContent = 'Уведомления включены. Chat ID: ' + data.telegram_chat_id;
                    telegramStatus.style.color = 'var(--success)';
                } else {
                    telegramStatus.textContent = 'Уведомления выключены: нужен token и chat id.';
                    telegramStatus.style.color = 'var(--text-3)';
                }
            } catch (err) {
                keyStatus.textContent = 'Не удалось загрузить настройки.';
                keyStatus.style.color = 'var(--error)';
            }
        }

        providerSelect.addEventListener('change', updateDefaultModelHint);

        saveKeyBtn.addEventListener('click', async () => {
            const key = keyInput.value.trim();
            if (!key) {
                if (!confirm('Оставить поле пустым удалит текущий ключ. Продолжить?')) return;
            }
            try {
                const resp = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        llm_provider: providerSelect.value,
                        llm_model: modelInput.value.trim(),
                        llm_api_key: key,
                    }),
                });
                if (!resp.ok) throw new Error('Failed to save settings');
                const data = await resp.json();
                keyInput.value = '';
                modelInput.value = data.llm_model || '';
                providerSelect.value = data.llm_provider || 'fireworks';
                updateDefaultModelHint();
                if (data.has_key) {
                    keyStatus.textContent = 'Ключ сохранён.';
                    keyStatus.style.color = 'var(--success)';
                } else {
                    keyStatus.textContent = 'Ключ удалён.';
                    keyStatus.style.color = 'var(--error)';
                }
                showToast('Настройки сохранены');
            } catch (err) {
                showToast('Ошибка сохранения настроек', true);
            }
        });

        saveTelegramBtn.addEventListener('click', async () => {
            try {
                const body = {
                    telegram_chat_id: telegramChatInput.value.trim(),
                };
                const token = telegramTokenInput.value.trim();
                if (token || confirm('Оставить поле token пустым удалит текущий Telegram bot token. Продолжить?')) {
                    body.telegram_bot_token = token;
                }
                const resp = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (!resp.ok) throw new Error('Failed to save telegram settings');
                showToast('Telegram настройки сохранены');
                await loadSettings();
            } catch (err) {
                showToast('Ошибка сохранения Telegram настроек', true);
            }
        });

        syncTelegramBtn.addEventListener('click', async () => {
            try {
                telegramStatus.textContent = 'Ищу последние сообщения боту...';
                const resp = await fetch('/api/telegram/sync', { method: 'POST' });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Telegram sync failed');
                telegramChatInput.value = data.chat_id || '';
                telegramStatus.textContent = `Чат найден: ${data.chat_id}${data.chat_username ? ' @' + data.chat_username : ''}`;
                telegramStatus.style.color = 'var(--success)';
                showToast('Telegram чат найден');
                await loadSettings();
            } catch (err) {
                telegramStatus.textContent = err.message;
                telegramStatus.style.color = 'var(--error)';
                showToast('Не удалось найти чат', true);
            }
        });

        testTelegramBtn.addEventListener('click', async () => {
            try {
                const resp = await fetch('/api/telegram/test', { method: 'POST' });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Telegram test failed');
                showToast('Тестовое сообщение отправлено');
            } catch (err) {
                telegramStatus.textContent = err.message;
                telegramStatus.style.color = 'var(--error)';
                showToast('Ошибка отправки тестового сообщения', true);
            }
        });

        loadSettings();
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
