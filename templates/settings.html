<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funpay Parser — Настройки</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
</head>
<body>
    <div class="bg-shapes"></div>
    <canvas id="stars" class="stars-canvas"></canvas>
    <div class="glow-layer">
        <div class="parallax" data-speed="0.02">
            <div class="shape shape-1"></div>
        </div>
        <div class="parallax" data-speed="0.04">
            <div class="shape shape-3"></div>
        </div>
        <div class="parallax" data-speed="0.03">
            <div class="shape shape-2"></div>
        </div>
        <div class="parallax" data-speed="0.05">
            <div class="shape shape-4"></div>
        </div>
        <div class="parallax" data-speed="0.06">
            <div class="shape shape-5"></div>
        </div>
    </div>
    <div class="app">
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-35 12 12)"/>
                        <circle cx="19" cy="8" r="1.5" fill="currentColor" stroke="none"/>
                    </svg>
                </div>
                <div>
                    <h1>Настройки</h1>
                    <p class="subtitle">Конфигурация LLM провайдера</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary btn-sm">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Вернуться к парсеру
                </a>
            </div>
        </header>

        <main class="main">
            <section class="section reveal" style="animation-delay: 0.05s;">
                <div class="section-header">
                    <div class="section-label">Настройки LLM</div>
                </div>
                <div class="card" style="max-width: 640px;">
                    <div class="field">
                        <label for="llm-provider">Провайдер</label>
                        <select id="llm-provider" class="form-input">
                            <option value="fireworks">Fireworks</option>
                            <option value="openrouter">OpenRouter</option>
                        </select>
                        <div class="hint" style="margin-top: 4px; color: var(--text-3);">
                            Выберите провайдера LLM для классификации лотов.
                        </div>
                    </div>
                    <div class="field">
                        <label for="llm-model">Модель</label>
                        <input type="text" id="llm-model" class="form-input" placeholder="оставь пустым для значения по умолчанию">
                        <div class="hint" style="margin-top: 4px; color: var(--text-3);">
                            Модель по умолчанию: <span id="default-model"></span>
                        </div>
                    </div>
                    <div class="field">
                        <label for="llm-api-key">API ключ</label>
                        <input type="password" id="llm-api-key" class="form-input" placeholder="Введите API ключ">
                        <div id="key-status" class="hint" style="margin-top: 6px;"></div>
                    </div>
                    <div class="actions" style="margin-top: 16px;">
                        <button id="save-key-btn" class="btn btn-primary">Сохранить</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const providerSelect = document.getElementById('llm-provider');
        const modelInput = document.getElementById('llm-model');
        const keyInput = document.getElementById('llm-api-key');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const keyStatus = document.getElementById('key-status');
        const defaultModel = document.getElementById('default-model');
        const toast = document.getElementById('toast');

        const defaultModels = {
            fireworks: 'accounts/fireworks/models/llama-v3p1-70b-instruct',
            openrouter: 'openai/gpt-4o-mini',
        };

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateDefaultModelHint() {
            defaultModel.textContent = defaultModels[providerSelect.value] || '';
        }

        async function loadSettings() {
            try {
                const resp = await fetch('/api/settings');
                if (!resp.ok) throw new Error('Failed to load settings');
                const data = await resp.json();
                providerSelect.value = data.llm_provider || 'fireworks';
                modelInput.value = data.llm_model || '';
                updateDefaultModelHint();
                if (data.has_key) {
                    keyStatus.textContent = 'Ключ установлен: ' + data.llm_api_key;
                    keyStatus.style.color = 'var(--success)';
                } else {
                    keyStatus.textContent = 'Ключ не настроен.';
                    keyStatus.style.color = 'var(--error)';
                }
            } catch (err) {
                keyStatus.textContent = 'Не удалось загрузить настройки.';
                keyStatus.style.color = 'var(--error)';
            }
        }

        providerSelect.addEventListener('change', updateDefaultModelHint);

        saveKeyBtn.addEventListener('click', async () => {
            const key = keyInput.value.trim();
            if (!key) {
                if (!confirm('Оставить поле пустым удалит текущий ключ. Продолжить?')) return;
            }
            try {
                const resp = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        llm_provider: providerSelect.value,
                        llm_model: modelInput.value.trim(),
                        llm_api_key: key,
                    }),
                });
                if (!resp.ok) throw new Error('Failed to save settings');
                const data = await resp.json();
                keyInput.value = '';
                modelInput.value = data.llm_model || '';
                providerSelect.value = data.llm_provider || 'fireworks';
                updateDefaultModelHint();
                if (data.has_key) {
                    keyStatus.textContent = 'Ключ сохранён.';
                    keyStatus.style.color = 'var(--success)';
                } else {
                    keyStatus.textContent = 'Ключ удалён.';
                    keyStatus.style.color = 'var(--error)';
                }
                showToast('Настройки сохранены');
            } catch (err) {
                showToast('Ошибка сохранения настроек', true);
            }
        });

        loadSettings();
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
