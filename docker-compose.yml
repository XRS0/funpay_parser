services:
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://kafka:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped

  llm-service:
    build:
      context: .
      args:
        SERVICE: llm-service
    environment:
      - DATA_DIR=/app/data
      - LLM_PROVIDER=${LLM_PROVIDER:-fireworks}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-70b-instruct}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - LLM_GRPC_ADDR=:9091
    volumes:
      - ./data:/app/data
    expose:
      - "9091"
    restart: unless-stopped

  parser-service:
    build:
      context: .
      args:
        SERVICE: parser-service
    depends_on:
      - llm-service
    environment:
      - DATA_DIR=/app/data
      - FUNPAY_BASE_URL=${FUNPAY_BASE_URL:-https://funpay.com}
      - FUNPAY_LANG=${FUNPAY_LANG:-en}
      - MAX_PAGES=${MAX_PAGES:-3}
      - PROXY=${PROXY:-}
      - PARSER_GRPC_ADDR=:9090
      - LLM_SERVICE_ADDR=llm-service:9091
    volumes:
      - ./data:/app/data
    expose:
      - "9090"
    restart: unless-stopped

  telegram-service:
    build:
      context: .
      args:
        SERVICE: telegram-service
    depends_on:
      - kafka
    environment:
      - DATA_DIR=/app/data
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-}
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_DEAL_TOPIC=deals.found
      - TELEGRAM_KAFKA_GROUP=telegram-service
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        SERVICE: api
    depends_on:
      - kafka
      - parser-service
      - telegram-service
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - DATABASE_PATH=/app/data/parser.db
      - PORT=5000
      - PARSER_SERVICE_ADDR=parser-service:9090
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_DEAL_TOPIC=deals.found
      - LLM_PROVIDER=${LLM_PROVIDER:-fireworks}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-70b-instruct}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-}
    restart: unless-stopped

volumes:
  redpanda-data:
